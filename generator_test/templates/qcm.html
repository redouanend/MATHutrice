<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MATHutrice — QCM</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css" />
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"
    onload="window._katexReady=true; document.querySelectorAll('.math-render').forEach(renderMath)"></script>

  <style>
    :root {
      --purple-dark:  #542365;
      --purple-light: #8c52f0;
      --pink-soft:    #f8abe0;
      --red-main:     #ca1328;
      --red-coral:    #ff5757;
      --pink-hot:     #cb0a67;
      --bg:           #fdf5fb;
      --white:        #ffffff;
      --text-dark:    #1a0a20;
      --text-muted:   #7a5a85;
      --text-light:   #b89ec5;
      --border:       rgba(84,35,101,0.12);
      --shadow:       0 4px 24px rgba(84,35,101,0.08);
      --shadow-hover: 0 8px 40px rgba(140,82,240,0.18);
      --radius:       18px;
      --radius-sm:    10px;
      --green:        #2a7a2a;
      --green-bg:     #edf7ed;
      --green-border: #b4d9b0;
      --red-err:      #b01c1c;
      --red-bg:       #fdecea;
      --red-border:   #f0c0bb;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text-dark);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER (identique à module.html) ───────────────────────── */
    .header {
      background: linear-gradient(135deg, var(--purple-dark) 0%, #7a1a5c 50%, var(--pink-hot) 100%);
      position: relative; overflow: hidden; padding: 0;
    }
    .header::before {
      content: ''; position: absolute;
      top: -60px; right: -60px;
      width: 280px; height: 280px;
      background: rgba(248,171,224,0.15); border-radius: 50%;
    }
    .header::after {
      content: ''; position: absolute;
      bottom: -40px; left: 20%;
      width: 180px; height: 180px;
      background: rgba(140,82,240,0.2); border-radius: 50%;
    }
    .header-inner {
      position: relative; z-index: 1;
      padding: 28px 40px 32px;
    }

    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      color: rgba(255,255,255,0.8); font-size: 13px; font-weight: 500;
      text-decoration: none;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 7px 16px; border-radius: 30px;
      cursor: pointer; transition: all 0.2s; margin-bottom: 24px;
    }
    .back-btn:hover { background: rgba(255,255,255,0.2); color: white; }
    .back-btn svg   { width: 14px; height: 14px; }

    .header-top-row {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 16px;
      flex-wrap: wrap; margin-bottom: 20px;
    }
    .header-title-block h1 {
      font-size: 34px; font-weight: 800; color: white;
      line-height: 1.15; margin-bottom: 6px;
    }
    .header-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
    .chip {
      font-size: 11px; font-weight: 600; letter-spacing: .05em;
      text-transform: uppercase; padding: 4px 12px; border-radius: 30px;
      background: rgba(255,255,255,0.18); color: white;
      border: 1px solid rgba(255,255,255,0.25);
    }

    /* Barre de progression dans le header */
    .progress-header {
      display: flex; align-items: center; gap: 12px;
      background: rgba(0,0,0,0.15);
      border-radius: var(--radius); padding: 14px 20px;
      backdrop-filter: blur(10px);
    }
    .progress-info { flex: 1; }
    .progress-label {
      font-size: 12px; color: rgba(255,255,255,0.75); font-weight: 500;
      margin-bottom: 8px; display: flex; justify-content: space-between;
    }
    .progress-bar-wrap {
      background: rgba(255,255,255,0.15);
      border-radius: 30px; height: 8px; overflow: hidden;
    }
    .progress-bar-fill {
      background: linear-gradient(90deg, var(--pink-soft), var(--purple-light));
      height: 100%; border-radius: 30px;
      transition: width 0.7s cubic-bezier(.4,0,.2,1); width: 0%;
    }
    .progress-pct {
      font-size: 22px; font-weight: 700; color: white;
      min-width: 52px; text-align: right;
    }

    /* ── MAIN ───────────────────────────────────────────────────── */
    .main { max-width: 760px; margin: 0 auto; padding: 40px 40px 80px; }

    /* ── LOADING ─────────────────────────────────────────────────── */
    #loading { text-align: center; padding: 80px 20px; }
    .spinner {
      width: 44px; height: 44px; margin: 0 auto 20px;
      border: 3px solid var(--border);
      border-top-color: var(--purple-light);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    .loading-title { font-size: 16px; font-weight: 600; color: var(--text-dark); margin-bottom: 6px; }
    .loading-hint  { font-size: 13px; color: var(--text-light); }

    /* ── ERROR ───────────────────────────────────────────────────── */
    #error-screen {
      display: none; text-align: center; padding: 60px 20px;
    }
    .error-emoji { font-size: 36px; margin-bottom: 14px; }
    .error-title { font-size: 16px; font-weight: 600; color: var(--text-dark); margin-bottom: 8px; }
    .error-detail {
      font-size: 12px; color: var(--text-light);
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 14px;
      margin-bottom: 20px; text-align: left; word-break: break-all;
    }

    /* ── QUESTION CARD ───────────────────────────────────────────── */
    .q-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow);
      animation: rise .3s ease;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .q-label {
      font-size: 11px; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text-light);
      margin-bottom: 14px;
    }
    .q-text {
      font-size: 17px; font-weight: 500; line-height: 1.7;
      color: var(--text-dark); margin-bottom: 24px;
    }

    /* ── OPTIONS ─────────────────────────────────────────────────── */
    .options { display: flex; flex-direction: column; gap: 10px; }

    .opt {
      width: 100%; text-align: left;
      padding: 14px 18px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--white); color: var(--text-dark);
      font-family: 'Poppins', sans-serif; font-size: 14px; line-height: 1.5;
      cursor: pointer;
      display: flex; align-items: flex-start; gap: 12px;
      transition: border-color .15s, background .15s, transform .12s;
    }
    .opt:hover:not(:disabled) {
      border-color: var(--purple-light);
      background: #fdf5fb;
      transform: translateX(3px);
    }
    .opt:disabled { cursor: default; transform: none; }

    .opt-letter {
      font-size: 11px; font-weight: 700; letter-spacing: .06em;
      color: var(--text-light); min-width: 18px;
      padding-top: 1px; flex-shrink: 0;
      background: var(--bg); border-radius: 5px;
      padding: 2px 6px; margin-top: 1px;
    }
    .opt-body { flex: 1; }
    .opt-icon { margin-left: auto; flex-shrink: 0; font-size: 15px; display: none; padding-top: 1px; }

    /* États */
    .opt.correct {
      border-color: var(--green-border);
      background: var(--green-bg);
    }
    .opt.correct .opt-letter { background: var(--green-bg); color: var(--green); }
    .opt.correct .opt-icon   { display: block; }

    .opt.wrong {
      border-color: var(--red-border);
      background: var(--red-bg);
    }
    .opt.wrong .opt-letter { background: var(--red-bg); color: var(--red-err); }
    .opt.wrong .opt-icon   { display: block; }

    /* ── FEEDBACK ────────────────────────────────────────────────── */
    .feedback {
      margin-top: 16px; padding: 14px 18px;
      border-radius: var(--radius-sm);
      font-size: 13.5px; line-height: 1.65;
      display: none; animation: rise .2s ease;
    }
    .feedback.show { display: block; }
    .feedback.ok   { background: var(--green-bg); border: 1px solid var(--green-border); color: var(--green); }
    .feedback.ko   { background: var(--red-bg);   border: 1px solid var(--red-border);   color: var(--red-err); }

    .feedback-title { font-weight: 700; margin-bottom: 4px; font-size: 14px; }

    /* ── CARD FOOTER ─────────────────────────────────────────────── */
    .card-footer {
      margin-top: 24px; padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end;
    }

    /* ── BOUTON PRINCIPAL (gradient identique à train-btn) ───────── */
    .btn-next {
      background: linear-gradient(135deg, var(--purple-dark), var(--red-main));
      color: white; font-size: 15px; font-weight: 600;
      font-family: 'Poppins', sans-serif;
      padding: 13px 36px; border: none; border-radius: var(--radius-sm);
      cursor: pointer; transition: all .25s ease;
      box-shadow: 0 4px 14px rgba(84,35,101,0.25);
      display: flex; align-items: center; gap: 8px;
    }
    .btn-next:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(84,35,101,0.35);
    }
    .btn-next:active:not(:disabled) { transform: scale(0.97); }
    .btn-next:disabled {
      opacity: 0.4; cursor: default;
      transform: none; box-shadow: none;
    }

    .btn-ghost {
      background: none; color: var(--text-muted);
      border: 1.5px solid var(--border);
      font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 500;
      padding: 11px 22px; border-radius: var(--radius-sm);
      cursor: pointer; transition: all .15s; margin-right: 10px;
    }
    .btn-ghost:hover { background: var(--bg); border-color: var(--purple-light); color: var(--purple-dark); }

    /* ── SCORE SCREEN ────────────────────────────────────────────── */
    #score-screen {
      display: none;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-hover);
      overflow: hidden;
      animation: rise .4s ease;
    }
    #score-screen.show { display: block; }

    .score-header {
      background: linear-gradient(135deg, var(--purple-dark) 0%, #7a1a5c 50%, var(--pink-hot) 100%);
      padding: 40px 36px; text-align: center; position: relative; overflow: hidden;
    }
    .score-header::before {
      content: ''; position: absolute; top: -40px; right: -40px;
      width: 180px; height: 180px;
      background: rgba(248,171,224,0.15); border-radius: 50%;
    }
    .score-num {
      font-size: 76px; font-weight: 800; color: white;
      line-height: 1; margin-bottom: 6px; position: relative;
    }
    .score-num sup { font-size: 32px; font-weight: 600; vertical-align: super; opacity: .8; }
    .score-caption { font-size: 15px; color: rgba(255,255,255,0.8); font-weight: 400; position: relative; }

    .score-body { padding: 32px 36px 36px; }

    .score-stats {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px; margin-bottom: 32px;
    }
    .stat-box {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 16px 12px; text-align: center;
    }
    .stat-val  { font-size: 24px; font-weight: 700; margin-bottom: 4px; color: var(--text-dark); }
    .stat-lbl  { font-size: 10px; letter-spacing: .07em; text-transform: uppercase; color: var(--text-light); }
    .stat-box.g .stat-val { color: var(--green); }
    .stat-box.r .stat-val { color: var(--red-err); }

    .score-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .score-actions .btn-next { padding: 13px 40px; }

    /* ── TOAST ───────────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text-dark); color: white;
      font-size: 13px; font-weight: 500;
      padding: 12px 22px; border-radius: 30px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      opacity: 0; pointer-events: none;
      transition: all .3s ease; z-index: 9999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { background: var(--red-main); }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .header-inner { padding: 20px; }
      .header-title-block h1 { font-size: 26px; }
      .main { padding: 24px 16px 64px; }
      .q-card { padding: 22px 18px; }
      .score-num { font-size: 56px; }
      .score-stats { grid-template-columns: 1fr 1fr; }
      .score-body { padding: 22px 18px 28px; }
    }
  </style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────────────── -->
<div class="header">
  <div class="header-inner">

    <a class="back-btn" id="back-btn" href="/">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10 3L5 8l5 5"/>
      </svg>
      Retour au module
    </a>

    <div class="header-top-row">
      <div class="header-title-block">
        <h1 id="header-title">QCM</h1>
        <div class="header-chips">
          <span class="chip" id="chip-notion">—</span>
          <span class="chip" id="chip-niveau">—</span>
        </div>
      </div>
    </div>

    <div class="progress-header">
      <div class="progress-info">
        <div class="progress-label">
          <span id="prog-label">Question 1 / 9</span>
          <span id="prog-questions">0 répondue(s)</span>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" id="prog-fill"></div>
        </div>
      </div>
      <div class="progress-pct" id="prog-pct">0%</div>
    </div>

  </div>
</div>

<!-- ── MAIN ────────────────────────────────────────────────────── -->
<div class="main">

  <!-- LOADING -->
  <div id="loading">
    <div class="spinner"></div>
    <p class="loading-title">Génération des questions…</p>
    <p class="loading-hint">Mistral prépare vos exercices, quelques secondes.</p>
  </div>

  <!-- ERROR -->
  <div id="error-screen">
    <p class="error-emoji">⚠️</p>
    <p class="error-title">Impossible de charger les questions</p>
    <p class="error-detail" id="error-detail"></p>
    <button class="btn-next" onclick="startSession()">Réessayer</button>
  </div>

  <!-- QUESTION SLOT -->
  <div id="q-slot"></div>

  <!-- SCORE -->
  <div id="score-screen">
    <div class="score-header">
      <p class="score-num" id="score-num">—</p>
      <p class="score-caption" id="score-caption">—</p>
    </div>
    <div class="score-body">
      <div class="score-stats">
        <div class="stat-box g">
          <div class="stat-val" id="stat-ok">—</div>
          <div class="stat-lbl">Correctes</div>
        </div>
        <div class="stat-box r">
          <div class="stat-val" id="stat-ko">—</div>
          <div class="stat-lbl">Incorrectes</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="stat-tot">—</div>
          <div class="stat-lbl">Questions</div>
        </div>
      </div>
      <div class="score-actions">
        <button class="btn-ghost" onclick="startSession()">Recommencer</button>
        <button class="btn-next" onclick="goBack()">← Retour au module</button>
      </div>
    </div>
  </div>

</div><!-- /main -->

<div class="toast" id="toast"></div>

<script>
/* ── CONFIG ──────────────────────────────────────────────────────── */
const API_URL = "/generate_qcm";
const DEFAULTS = { notion: "trigonométrie", niveau: "intermédiaire", n: 9 };

/* ── STATE ───────────────────────────────────────────────────────── */
let questions = [];
let results   = [];   // true | false
let cursor    = 0;
let urlParams = {};

/* ── DOM ─────────────────────────────────────────────────────────── */
const $loading  = document.getElementById("loading");
const $error    = document.getElementById("error-screen");
const $errDet   = document.getElementById("error-detail");
const $qSlot    = document.getElementById("q-slot");
const $score    = document.getElementById("score-screen");

/* ── KATEX ───────────────────────────────────────────────────────── */
function renderMath(el) {
  if (!window._katexReady || !window.renderMathInElement) return;
  renderMathInElement(el, {
    delimiters: [
      { left: "$$",  right: "$$",  display: true  },
      { left: "$",   right: "$",   display: false },
      { left: "\\(", right: "\\)", display: false },
      { left: "\\[", right: "\\]", display: true  },
    ],
    throwOnError: false,
  });
}

/* ── FETCH ───────────────────────────────────────────────────────── */
async function startSession() {
  show($loading); hide($error); hide($score);
  $qSlot.innerHTML = "";
  questions = []; results = []; cursor = 0;

  const p = new URLSearchParams(window.location.search);
  urlParams = {
    notion: p.get("notion") || DEFAULTS.notion,
    niveau: p.get("niveau") || DEFAULTS.niveau,
    n:      parseInt(p.get("n")) || DEFAULTS.n,
  };

  // Met à jour le header
  const notionLabel = urlParams.notion.charAt(0).toUpperCase() + urlParams.notion.slice(1);
  document.getElementById("chip-notion").textContent = notionLabel;
  document.getElementById("chip-niveau").textContent = urlParams.niveau;
  document.getElementById("header-title").textContent = "QCM · " + notionLabel;

  // Lien retour vers le module
  document.getElementById("back-btn").href =
    `/module.html?module=${encodeURIComponent(urlParams.notion)}&niveau=${encodeURIComponent(urlParams.niveau)}`;

  updateProgress(0);

  try {
    const res  = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(urlParams),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || "Erreur API");

    questions = data.questions;
    results   = new Array(questions.length).fill(null);
    document.getElementById("stat-tot").textContent = questions.length;

    hide($loading);
    renderCard(0);

  } catch (err) {
    hide($loading); show($error);
    $errDet.textContent = err.message;
  }
}

/* ── RENDER CARD ─────────────────────────────────────────────────── */
function renderCard(idx) {
  $score.classList.remove("show");
  updateProgress(idx);

  const q       = questions[idx];
  const letters = ["A", "B", "C", "D", "E"];
  const isLast  = idx === questions.length - 1;

  const optsHTML = q.options.map((opt, i) => `
    <button class="opt math-render" data-i="${i}"
      onclick="handleAnswer(${idx}, ${i}, this)">
      <span class="opt-letter">${letters[i]}</span>
      <span class="opt-body">${opt}</span>
      <span class="opt-icon">${i === 0 ? '' : ''}</span>
    </button>
  `).join("");

  const card = document.createElement("div");
  card.className = "q-card";
  card.innerHTML = `
    <p class="q-label">Question ${idx + 1} sur ${questions.length}</p>
    <p class="q-text math-render">${q.question}</p>
    <div class="options">${optsHTML}</div>
    <div class="feedback" id="fb"></div>
    <div class="card-footer">
      <button class="btn-next" id="btn-next"
        onclick="goNext(${idx})" disabled>
        ${isLast ? "Voir mes résultats →" : "Question suivante →"}
      </button>
    </div>
  `;

  $qSlot.innerHTML = "";
  $qSlot.appendChild(card);

  card.querySelectorAll(".math-render").forEach(renderMath);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

/* ── ANSWER ──────────────────────────────────────────────────────── */
function handleAnswer(qIdx, choiceIdx, btn) {
  const q = questions[qIdx];
  const correctIdx = q.options.findIndex(
    o => o.trim() === String(q.answer).trim()
  );

  const allOpts = btn.closest(".options").querySelectorAll(".opt");
  allOpts.forEach(b => {
    b.disabled = true;
    const i = parseInt(b.dataset.i);
    if (i === correctIdx) {
      b.classList.add("correct");
      b.querySelector(".opt-icon").textContent = "✓";
    } else if (i === choiceIdx && i !== correctIdx) {
      b.classList.add("wrong");
      b.querySelector(".opt-icon").textContent = "✕";
    }
  });

  const isCorrect   = choiceIdx === correctIdx;
  results[qIdx]     = isCorrect;

  const fb = document.getElementById("fb");
  fb.className = `feedback show ${isCorrect ? "ok" : "ko"}`;
  fb.innerHTML = isCorrect
    ? `<p class="feedback-title">Bonne réponse ! 🎉</p>`
    : `<p class="feedback-title">Pas tout à fait.</p>
       <p>La bonne réponse était : <strong>${q.answer}</strong></p>`;

  renderMath(fb);
  document.getElementById("btn-next").disabled = false;
  updateProgress(results.filter(r => r !== null).length);
}

/* ── NAVIGATION ──────────────────────────────────────────────────── */
function goNext(fromIdx) {
  if (fromIdx + 1 < questions.length) {
    cursor = fromIdx + 1;
    renderCard(cursor);
  } else {
    showScore();
  }
}

function goBack() {
  window.location.href = document.getElementById("back-btn").href;
}

/* ── PROGRESS ────────────────────────────────────────────────────── */
function updateProgress(done) {
  const total = questions.length || DEFAULTS.n;
  const pct   = Math.round((done / total) * 100);
  document.getElementById("prog-fill").style.width    = pct + "%";
  document.getElementById("prog-pct").textContent     = pct + "%";
  document.getElementById("prog-label").textContent   = `Question ${Math.min(done + 1, total)} / ${total}`;
  document.getElementById("prog-questions").textContent = done + " répondue(s)";
}

/* ── SCORE ───────────────────────────────────────────────────────── */
function showScore() {
  $qSlot.innerHTML = "";

  const total   = results.length;
  const correct = results.filter(r => r === true).length;
  const wrong   = results.filter(r => r === false).length;
  const pct     = Math.round((correct / total) * 100);

  document.getElementById("prog-fill").style.width     = "100%";
  document.getElementById("prog-pct").textContent      = "100%";
  document.getElementById("prog-label").textContent    = "Terminé !";
  document.getElementById("prog-questions").textContent = total + " répondue(s)";

  document.getElementById("score-num").innerHTML =
    `${pct}<sup>%</sup>`;
  document.getElementById("score-caption").textContent =
    pct >= 80 ? "Excellent ! Vous maîtrisez le sujet. 🏆" :
    pct >= 60 ? "Très bien ! Continuez sur cette lancée." :
    pct >= 40 ? "Bon effort. Quelques points à consolider." :
                "Pas de panique, la pratique paie ! 💪";

  document.getElementById("stat-ok").textContent  = correct;
  document.getElementById("stat-ko").textContent  = wrong;
  document.getElementById("stat-tot").textContent = total;

  $score.classList.add("show");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

/* ── TOAST ───────────────────────────────────────────────────────── */
function showToast(msg, isError = false) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className   = "toast show" + (isError ? " error" : "");
  setTimeout(() => { t.className = "toast"; }, 3500);
}

/* ── HELPERS ─────────────────────────────────────────────────────── */
function show(el) { el.style.display = ""; }
function hide(el) { el.style.display = "none"; }

/* ── INIT ────────────────────────────────────────────────────────── */
startSession();
</script>
</body>
</html>
