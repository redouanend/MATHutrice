<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>MATHutrice — Accueil</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <style>
    :root {
      --purple-dark: #542365;
      --purple-mid: #7b2d8b;
      --purple-light: #8c52f0;
      --pink-hot: #cb0a67;
      --bg: #f7f4fb;
      --white: #ffffff;
      --text-dark: #1a0a20;
      --text-muted: #7a5a85;
      --text-light: #b89ec5;
      --border: rgba(84,35,101,0.10);
      --shadow: 0 2px 16px rgba(84,35,101,0.08);
      --shadow-hover: 0 6px 24px rgba(140,82,240,0.18);
      --radius: 14px;
      --iconbar-w: 68px;
      --sidebar-w: 320px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100vh; overflow: hidden;
      font-family: 'Poppins', sans-serif;
      color: var(--text-dark); background: var(--bg);
      display: flex;
    }

    /* ══ ICON BAR ══ */
    .iconbar {
      width: var(--iconbar-w);
      background: linear-gradient(180deg, #3d1060 0%, #5c1a80 50%, #7b2060 100%);
      display: flex; flex-direction: column; align-items: center;
      padding: 16px 0; gap: 4px; flex-shrink: 0; z-index: 30;
    }

    .iconbar-logo {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--purple-light), var(--pink-hot));
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px; cursor: pointer;
    }

    .iconbar-logo svg { width: 22px; height: 22px; }

    .ib {
      width: 44px; height: 44px; border: none; border-radius: 12px;
      background: transparent; color: rgba(255,255,255,0.45);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }

    .ib:hover, .ib.on { background: rgba(255,255,255,0.15); color: white; }
    .ib svg { width: 20px; height: 20px; }
    .ib-spacer { flex: 1; }

    /* ══ SIDEBAR ══ */
    .sidebar {
      width: var(--sidebar-w);
      background: linear-gradient(160deg, #3d1060 0%, #5c1a80 50%, #8c1a60 100%);
      display: flex; flex-direction: column; flex-shrink: 0;
      transition: margin-left 0.3s cubic-bezier(.4,0,.2,1); z-index: 20;
      overflow: hidden;
    }

    .sidebar.hide { margin-left: calc(-1 * var(--sidebar-w)); }

    .sb-head { padding: 20px 20px 16px; }

    .sb-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }

    .sb-brand-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: linear-gradient(135deg, var(--purple-light), var(--pink-hot));
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }

    .sb-brand-icon svg { width: 20px; height: 20px; color: white; }
    .sb-brand-txt h2 { font-size: 16px; font-weight: 700; color: white; line-height: 1.1; }
    .sb-brand-txt p { font-size: 11px; color: rgba(255,255,255,0.55); font-weight: 400; }

    .btn-new {
      width: 100%; padding: 12px 16px; border: none; border-radius: 12px;
      background: linear-gradient(135deg, var(--purple-light), var(--pink-hot));
      color: white; font-family: 'Poppins', sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: transform 0.15s, opacity 0.15s;
    }

    .btn-new:hover { transform: translateY(-1px); opacity: 0.95; }

    .sb-search { padding: 10px 20px; }

    .search-row { display: flex; gap: 8px; }

    .search-box {
      flex: 1; display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px; padding: 8px 12px;
    }

    .search-box svg { width: 14px; height: 14px; color: rgba(255,255,255,0.5); flex-shrink: 0; }

    .search-box input {
      flex: 1; border: none; outline: none; background: transparent;
      font-family: 'Poppins', sans-serif; font-size: 12px; color: white;
    }

    .search-box input::placeholder { color: rgba(255,255,255,0.4); }

    .btn-filter {
      width: 36px; height: 36px; border: none; border-radius: 10px;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.6); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    .btn-filter svg { width: 15px; height: 15px; }

    .sb-section-label {
      padding: 10px 20px 6px;
      font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.4);
      text-transform: uppercase; letter-spacing: 0.8px;
      display: flex; align-items: center; gap: 6px;
    }

    .sb-section-label svg { width: 13px; height: 13px; }

    .hist { flex: 1; overflow-y: auto; padding: 0 10px 10px; }
    .hist::-webkit-scrollbar { width: 3px; }
    .hist::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

    .hi {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 10px; cursor: pointer;
      transition: background 0.15s; margin-bottom: 2px;
    }

    .hi:hover { background: rgba(255,255,255,0.08); }
    .hi.on { background: rgba(255,255,255,0.12); }

    .hi-icon {
      width: 36px; height: 36px; border-radius: 9px;
      background: rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }

    .hi-icon svg { width: 16px; height: 16px; color: rgba(255,255,255,0.7); }

    .hi-info { flex: 1; min-width: 0; }
    .hi-title { font-size: 13px; font-weight: 600; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hi-preview { font-size: 11px; color: rgba(255,255,255,0.45); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hi-time { font-size: 10px; color: rgba(255,255,255,0.35); flex-shrink: 0; }

    .btn-see-all {
      margin: 8px 20px 12px; padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.15); border-radius: 10px;
      background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7);
      font-family: 'Poppins', sans-serif; font-size: 12px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: background 0.2s;
    }

    .btn-see-all:hover { background: rgba(255,255,255,0.1); }
    .btn-see-all svg { width: 14px; height: 14px; }

    .sb-foot {
      padding: 12px 20px; border-top: 1px solid rgba(255,255,255,0.08);
      display: flex; gap: 16px;
    }

    .sb-foot-btn {
      display: flex; align-items: center; gap: 7px;
      color: rgba(255,255,255,0.45); font-size: 12px; cursor: pointer; transition: color 0.2s;
    }

    .sb-foot-btn:hover { color: rgba(255,255,255,0.8); }
    .sb-foot-btn svg { width: 16px; height: 16px; }

    /* ══ MAIN ══ */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }

    .topbar {
      height: 56px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; background: var(--white);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }

    .topbar-left { display: flex; align-items: center; gap: 12px; }

    .tb {
      width: 36px; height: 36px; border: none; border-radius: 9px;
      background: transparent; cursor: pointer; color: var(--text-muted);
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }

    .tb:hover { background: var(--bg); color: var(--text-dark); }
    .tb svg { width: 18px; height: 18px; }

    .topbar-title { font-size: 15px; font-weight: 700; color: var(--purple-dark); }

    .topbar-icon {
      width: 36px; height: 36px; border: none; border-radius: 9px;
      background: transparent; cursor: pointer; color: var(--text-muted);
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }

    .topbar-icon:hover { background: var(--bg); }
    .topbar-icon svg { width: 18px; height: 18px; }

    .scroll-area { flex: 1; overflow-y: auto; }
    .scroll-area::-webkit-scrollbar { width: 5px; }
    .scroll-area::-webkit-scrollbar-thumb { background: rgba(84,35,101,0.12); border-radius: 5px; }

    .content { max-width: 900px; margin: 0 auto; padding: 40px 28px 60px; }

    /* titre */
    .page-title {
      font-size: 48px; font-weight: 800; text-align: center;
      background: linear-gradient(135deg, var(--purple-dark), var(--pink-hot));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 28px; letter-spacing: -1px;
    }

    /* messages */
    .msgs-area { display: none; margin-bottom: 24px; }
    .msgs-area.visible { display: block; }

    .msg { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 18px; }
    .msg.user { flex-direction: row-reverse; }

    .msg-av {
      width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: white;
    }

    .msg.assistant .msg-av { background: linear-gradient(135deg, var(--purple-light), var(--pink-hot)); }
    .msg.user .msg-av { background: linear-gradient(135deg, var(--purple-dark), var(--purple-mid)); }

    .msg-body { max-width: 75%; }
    .msg-name { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; }
    .msg.user .msg-name { text-align: right; }

    .msg-text {
      font-size: 14px; line-height: 1.65; padding: 12px 16px;
      border-radius: 14px; word-break: break-word;
    }

    .msg.assistant .msg-text {
      background: var(--white); color: var(--text-dark);
      border: 1px solid var(--border); border-bottom-left-radius: 4px;
      box-shadow: var(--shadow);
    }

    .msg.user .msg-text {
      background: linear-gradient(135deg, var(--purple-dark), var(--purple-mid));
      color: white; border-bottom-right-radius: 4px;
    }

    .msg-text h1, .msg-text h2, .msg-text h3 { margin: 10px 0 6px; color: var(--purple-dark); }
    .msg-text p { margin-bottom: 8px; }
    .msg-text ul, .msg-text ol { padding-left: 20px; margin-bottom: 8px; }
    .msg-text code { background: rgba(84,35,101,0.08); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    .msg-text pre { background: rgba(84,35,101,0.06); padding: 12px; border-radius: 8px; overflow-x: auto; }

    .dots { display: flex; gap: 5px; padding: 4px 0; }
    .dots span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--purple-light); animation: blink 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }

    /* input */
    .input-wrap {
      background: var(--white); border: 1.5px solid rgba(140,82,240,0.25);
      border-radius: 16px; padding: 6px 6px 6px 18px;
      display: flex; align-items: center; gap: 8px;
      box-shadow: 0 2px 20px rgba(84,35,101,0.08); margin-bottom: 10px;
    }

    .input-wrap textarea {
      flex: 1; border: none; outline: none; background: transparent;
      font-family: 'Poppins', sans-serif; font-size: 14px; color: var(--text-dark);
      resize: none; max-height: 120px; line-height: 1.5; padding: 8px 0;
    }

    .input-wrap textarea::placeholder { color: #b89ec5; }

    .btn-send {
      width: 44px; height: 44px; border: none; border-radius: 12px;
      background: linear-gradient(135deg, var(--purple-light), var(--pink-hot));
      color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s, opacity 0.2s; flex-shrink: 0;
    }

    .btn-send:hover { transform: scale(1.05); }
    .btn-send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-send svg { width: 18px; height: 18px; }

    .btn-att {
      width: 44px; height: 44px; border: none; border-radius: 12px;
      background: var(--bg); color: var(--text-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: background 0.2s; flex-shrink: 0;
    }

    .btn-att:hover { background: rgba(140,82,240,0.08); color: var(--purple-light); }
    .btn-att svg { width: 18px; height: 18px; }

    .helper-text {
      text-align: center; color: var(--text-muted);
      font-size: 12px; font-weight: 500; margin-bottom: 32px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }

    .helper-text svg { width: 14px; height: 14px; color: var(--purple-light); }

    /* modules */
    .modules-label {
      display: flex; align-items: center; gap: 10px;
      font-size: 15px; font-weight: 700; color: var(--text-dark); margin-bottom: 18px;
    }

    .modules-label svg { width: 20px; height: 20px; color: var(--purple-light); }

    .modules-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 14px; margin-bottom: 24px; }

    .module-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px;
      display: flex; align-items: center; gap: 16px;
      text-decoration: none; transition: box-shadow 0.2s, transform 0.2s; box-shadow: var(--shadow);
    }

    .module-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }

    .module-icon {
      width: 52px; height: 52px; border-radius: 12px;
      background: linear-gradient(135deg, var(--purple-light), var(--pink-hot));
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 13px; font-weight: 800;
      color: white; font-family: monospace; letter-spacing: -0.5px;
    }

    .module-body { flex: 1; min-width: 0; }

    .module-name { font-size: 14px; font-weight: 700; color: var(--purple-dark); margin-bottom: 4px; line-height: 1.2; }

    .module-desc {
      font-size: 11px; color: var(--text-muted); line-height: 1.45;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    .module-stars { display: flex; gap: 3px; flex-shrink: 0; }

    .star { width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; }
    .star svg { width: 100%; height: 100%; }
    .star.full svg path { fill: #c4a0e8; }
    .star.empty svg path { fill: #e8ddf0; }

    .btn-more {
      width: 100%; padding: 14px; border: 1px solid var(--border);
      border-radius: var(--radius); background: var(--white);
      color: var(--pink-hot); font-family: 'Poppins', sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.2s;
    }

    .btn-more:hover { background: rgba(203,10,103,0.04); }
    .btn-more svg { width: 16px; height: 16px; }

    #fileInput { display: none; }

    @media (max-width: 768px) {
      .sidebar, .iconbar { display: none; }
      .page-title { font-size: 32px; }
      .modules-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- ICON BAR -->
  <nav class="iconbar">
    <div class="iconbar-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </div>
    <button class="ib on" onclick="newChat()" title="Nouvelle discussion">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <button class="ib" title="Rechercher">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M16 16l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <button class="ib" onclick="toggleSB()" title="Historique">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M12 7v5l3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="ib" title="Messages">
      <svg viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="ib-spacer"></div>
    <button class="ib" title="Paramètres">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="2"/></svg>
    </button>
    <button class="ib" title="Aide">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="17" r="0.5" fill="currentColor" stroke="currentColor"/></svg>
    </button>
  </nav>

  <!-- SIDEBAR -->
  <aside class="sidebar hide" id="sb">
    <div class="sb-head">
      <div class="sb-brand">
        <div class="sb-brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/></svg>
        </div>
        <div class="sb-brand-txt">
          <h2>Tuteur IA</h2>
          <p>Votre assistant pédagogique</p>
        </div>
      </div>
      <button class="btn-new" onclick="newChat()">
        <svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M12 5v14M5 12h14" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg>
        Nouvelle discussion
      </button>
    </div>

    <div class="sb-search">
      <div class="search-row">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M16 16l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <input type="text" placeholder="Rechercher dans l'historique..." id="searchInput" oninput="filterHist()">
        </div>
        <button class="btn-filter">
          <svg viewBox="0 0 24 24" fill="none"><path d="M4 6h16M7 12h10M10 18h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>

    <div class="sb-section-label">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M12 7v5l3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      Historique
    </div>

    <div class="hist" id="histList"></div>

    <button class="btn-see-all">
      Voir tout l'historique
      <svg viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <div class="sb-foot">
      <div class="sb-foot-btn">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="2"/></svg>
        Paramètres
      </div>
      <div class="sb-foot-btn">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="17" r="0.5" fill="currentColor" stroke="currentColor"/></svg>
        Aide
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="tb" onclick="toggleSB()">
          <svg viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <span class="topbar-title" id="topTitle">Tuteur IA</span>
      </div>
      <button class="topbar-icon" title="Thème">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </header>

    <div class="scroll-area">
      <div class="content">

        <h1 class="page-title" id="pageTitle">Discutons !</h1>

        <div class="msgs-area" id="msgsArea">
          <div id="msgsWrap"></div>
        </div>

        <div class="input-wrap">
          <textarea id="chatInput" rows="1"
            placeholder="Pose une question, demande une explication..."
            onkeydown="onKey(event)" oninput="autoH(this)"></textarea>
          <button class="btn-send" id="btnSend" onclick="send()">
            <svg viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="btn-att" id="attachBtn">
            <svg viewBox="0 0 24 24" fill="none"><path d="M12 16V7M12 7L8.5 10.5M12 7L15.5 10.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 16.5V17C5 18.1046 5.89543 19 7 19H17C18.1046 19 19 18.1046 19 17V16.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
          <input type="file" id="fileInput" multiple accept="image/*,.pdf,.doc,.docx,.txt">
        </div>

        <p class="helper-text" id="helperText">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Choisis un module ou pose directement ta question.
        </p>

        <div class="modules-label">
          <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/><rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/></svg>
          Modules disponibles
        </div>

        <div class="modules-grid" id="modulesGrid"></div>

        <button class="btn-more">
          Voir plus de modules
          <svg viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>

      </div>
    </div>
  </div>

  <script>
    const MODULES = [
      {% for notion_id, title in notions %}
      { id: "{{ notion_id }}", name: "{{ title }}" },
      {% endfor %}
    ];

    const ICONS = ['sin', 'f(x)', 'x²', 'Aa', 'log', 'a/b', '∑', 'π', 'dx', '∫'];

    marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });

    function renderMath(el) {
      if (typeof renderMathInElement === 'function') {
        renderMathInElement(el, {
          delimiters: [
            { left: '$$', right: '$$', display: true },
            { left: '$', right: '$', display: false },
            { left: '\\[', right: '\\]', display: true },
            { left: '\\(', right: '\\)', display: false },
          ],
          throwOnError: false,
        });
      }
    }

    function preprocess(text) {
      if (!text) return '';
      text = text.replace(/\\n/g, '\n').replace(/\r\n/g, '\n');
      const latexCmd = /\\(frac|sqrt|sum|int|lim|sin|cos|tan|log|ln|alpha|beta|gamma|delta|theta|pi|sigma|omega|infty|cdot|times|div|pm|leq|geq|neq|approx|equiv|mathbb|vec|overline|begin|end)/;
      text = text.replace(/\(\s*([^()]{2,60})\s*\)/g, (m, inner) => {
        if (latexCmd.test(inner) || (/[_^{}]/.test(inner) && /\\/.test(inner))) return '$' + inner.trim() + '$';
        return m;
      });
      text = text.replace(/^(#{1,6})\s*\*\*([^*\n]+)\*\*/gm, '$1 $2');
      text = text.replace(/([^\n])\$\$/g, '$1\n\n$$');
      text = text.replace(/\$\$([^\n])/g, '$$\n\n$1');
      text = text.replace(/\n{3,}/g, '\n\n');
      return text.trim();
    }

    function md(text) { return marked.parse(preprocess(text)); }
    function escHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

    function getStarSVG(type) {
      return `<span class="star ${type}"><svg viewBox="0 0 24 24"><path d="M12 2.9L14.75 8.47L20.9 9.36L16.45 13.69L17.5 19.8L12 16.91L6.5 19.8L7.55 13.69L3.1 9.36L9.25 8.47L12 2.9Z"/></svg></span>`;
    }

    function renderModules() {
      const grid = document.getElementById('modulesGrid');
      MODULES.forEach((m, i) => {
        const card = document.createElement('a');
        card.className = 'module-card';
        card.href = `module.html?id=${m.id}`;
        const starsHTML = [0,1,2].map(() => getStarSVG('empty')).join('');
        card.innerHTML = `
          <div class="module-icon">${ICONS[i % ICONS.length]}</div>
          <div class="module-body">
            <div class="module-name">${escHtml(m.name)}</div>
          </div>
          <div class="module-stars">${starsHTML}</div>
        `;
        grid.appendChild(card);
      });
    }

    async function send() {
      const inp = document.getElementById('chatInput');
      const text = inp.value.trim();
      if (!text) return;
      window.location.href = `chat?q=${encodeURIComponent(text)}`;
    }

    function showMsgsArea() {}
    function hideMsgsArea() {}
    function renderMsgs() {}
    function scrollBot() {}
    function newChat() { window.location.href = 'chat'; }
    function loadConv(id) { window.location.href = 'chat?conv=' + id; }
    function save() {}
    function updateHist() {
      const list = document.getElementById('histList');
      const convs = JSON.parse(localStorage.getItem('math_convs') || '[]');
      const items = convs.filter(c => c.messages && c.messages.length > 0);
      if (!items.length) {
        list.innerHTML = '<div style="padding:20px;text-align:center;color:rgba(255,255,255,0.35);font-size:12px;">Aucune conversation</div>';
        return;
      }
      list.innerHTML = items.map(c => {
        const last = c.messages[c.messages.length - 1];
        const prev = last ? last.content.substring(0, 30) + '...' : '';
        return `
          <div class="hi" onclick="loadConv('${c.id}')">
            <div class="hi-icon">
              <svg viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <div class="hi-info">
              <div class="hi-title">${escHtml(c.title)}</div>
              <div class="hi-preview">${escHtml(prev)}</div>
            </div>
            <span class="hi-time">${fmtTime(c.at)}</span>
          </div>`;
      }).join('');
    }

    function fmtTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      const diff = Date.now() - d;
      if (diff < 3600000) return Math.max(1, Math.floor(diff / 60000)) + ' min';
      if (diff < 86400000) return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
      return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
    }

    function filterHist() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      document.querySelectorAll('.hi').forEach(el => {
        const t = el.querySelector('.hi-title').textContent.toLowerCase();
        el.style.display = t.includes(q) ? '' : 'none';
      });
    }

    function toggleSB() { document.getElementById('sb').classList.toggle('hide'); }
    function autoH(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
    function onKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }

    document.getElementById('attachBtn').addEventListener('click', () => {
      document.getElementById('fileInput').click();
    });

    renderModules();
    updateHist();
  </script>
</body>
</html>
